<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Five Fights Circle - Clean pie chart, no text -->

  <!-- Earn More: #6D28D9 (top, 0° to 72°) -->
  <path d="M 100 100 L 100 20 A 80 80 0 0 1 176.16 47.36 Z" fill="#6D28D9" stroke="white" stroke-width="1.5"/>

  <!-- Build More: #047857 (right-top, 72° to 144°) -->
  <path d="M 100 100 L 176.16 47.36 A 80 80 0 0 1 152.72 161.92 Z" fill="#047857" stroke="white" stroke-width="1.5"/>

  <!-- Save More: #BE185D (right-bottom, 144° to 216°) -->
  <path d="M 100 100 L 152.72 161.92 A 80 80 0 0 1 20 100 Z" fill="#BE185D" stroke="white" stroke-width="1.5"/>

  <!-- Care More: #C2410C (left-bottom, 216° to 288°) -->
  <path d="M 100 100 L 20 100 A 80 80 0 0 1 47.28 38.08 Z" fill="#C2410C" stroke="white" stroke-width="1.5"/>

  <!-- Protect More: #B45309 (left-top, 288° to 360°) -->
  <path d="M 100 100 L 47.28 38.08 A 80 80 0 0 1 100 20 Z" fill="#B45309" stroke="white" stroke-width="1.5"/>
</svg>